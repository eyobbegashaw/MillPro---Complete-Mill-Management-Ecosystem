version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:6
    container_name: millpro_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: millpro
    volumes:
      - mongodb_data:/data/db
      - ./backendMill/scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - millpro_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: millpro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - millpro_network

  # Backend API
  backend:
    build:
      context: ./backendMill
      dockerfile: Dockerfile
    container_name: millpro_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/millpro?authSource=admin
      REDIS_URL: redis://redis:6379
      PORT: 5000
    env_file:
      - ./backendMill/.env
    depends_on:
      - mongodb
      - redis
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - millpro_network

  # Frontend
  frontend:
    build:
      context: ./frontendMill
      dockerfile: Dockerfile
    container_name: millpro_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://backend:5000/api
      REACT_APP_SOCKET_URL: http://backend:5000
    env_file:
      - ./frontendMill/.env
    depends_on:
      - backend
    networks:
      - millpro_network

  # Nginx for reverse proxy
  nginx:
    image: nginx:alpine
    container_name: millpro_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - millpro_network

volumes:
  mongodb_data:
  redis_data:
  backend_uploads:
  backend_logs:

networks:
  millpro_network:
    driver: bridge